<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KADRO KUR - Profil</title>
  <link rel="stylesheet" href="/profile/style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="profile-header">
      <div class="header-top">
        <h1 class="logo">KADRO KUR</h1>
        <span class="badge">Profil</span>
      </div>
      <div class="user-info" id="userInfo">
        <div class="avatar" id="avatarIcon">
          <!-- Lucide User SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="user-details">
          <h2 id="userName">Yukleniyor...</h2>
          <p class="tiktok-handle" id="tiktokUsername">@...</p>
        </div>
      </div>
    </header>

    <!-- Stats Overview -->
    <section class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2"/>
            <path d="M3 9h18"/>
            <path d="M3 15h18"/>
            <path d="M9 3v18"/>
            <path d="M15 3v18"/>
          </svg>
        </div>
        <div class="stat-value" id="totalGames">-</div>
        <div class="stat-label">Toplam Oyun</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="6" height="10" x="2" y="12" rx="1"/>
            <rect width="6" height="16" x="9" y="6" rx="1"/>
            <rect width="6" height="20" x="16" y="2" rx="1"/>
          </svg>
        </div>
        <div class="stat-value" id="totalCards">-</div>
        <div class="stat-label">Acilan Kart</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20"/>
            <path d="M2 12h20"/>
            <path d="m4.93 4.93 14.14 14.14"/>
            <path d="m19.07 4.93-14.14 14.14"/>
          </svg>
        </div>
        <div class="stat-value" id="avgScore">-</div>
        <div class="stat-label">Ortalama Skor</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
          </svg>
        </div>
        <div class="stat-value" id="bestScore">-</div>
        <div class="stat-label">En Iyi Skor</div>
      </div>
    </section>

    <!-- Game History -->
    <section class="history-section">
      <h3 class="section-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Oyun Gecmisi
      </h3>
      <div class="history-grid" id="historyGrid">
        <!-- Game cards rendered by JS -->
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 16h.01"/>
          <path d="M8 16h.01"/>
          <path d="M12 20h.01"/>
          <path d="M20.77 11.66A8 8 0 1 0 4.5 18.5"/>
          <path d="m2 2 20 20"/>
        </svg>
        <p>Henuz oyun gecmisi yok.</p>
      </div>
    </section>

    <!-- Game Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="gameModal">
        <button class="modal-close" id="modalClose">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/>
            <path d="m6 6 12 12"/>
          </svg>
        </button>
        <div class="modal-content" id="modalContent">
          <!-- Filled dynamically -->
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div class="error-state" id="errorState" style="display:none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" x2="12" y1="8" y2="12"/>
        <line x1="12" x2="12.01" y1="16" y2="16"/>
      </svg>
      <h2>Profil Bulunamadi</h2>
      <p>Gecersiz veya bulunamayan lisans kimlik numarasi.</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Profil yukleniyor...</p>
    </div>
  </div>

  <script src="/profile/profile.js"></script>
</body>
</html>
