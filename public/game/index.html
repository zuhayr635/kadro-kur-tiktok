<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
  <title>KADRO KUR - TikTok Live Overlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay">

    <!-- Title Bar -->
    <header id="title-bar">
      <div class="title-glow"></div>
      <h1 class="title-text">
        <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        KADRO KUR
        <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m16 10-5.12 5.12-2.5-2.5"/></svg>
      </h1>
      <div class="title-subtitle">TikTok Live Draft</div>
    </header>

    <!-- Teams Grid (2x2) -->
    <main id="teams-grid">
      <div class="team-area" data-team="0">
        <div class="team-header">
          <div class="team-emblem"></div>
          <div class="team-info">
            <span class="team-name">Takim 1</span>
            <span class="team-stats">
              <span class="team-ovr">OVR: 0</span>
              <span class="team-fill">0/11</span>
            </span>
          </div>
        </div>
        <div class="pitch-container">
          <div class="pitch-field"></div>
          <div class="formation-slots"></div>
        </div>
      </div>
      <div class="team-area" data-team="1">
        <div class="team-header">
          <div class="team-emblem"></div>
          <div class="team-info">
            <span class="team-name">Takim 2</span>
            <span class="team-stats">
              <span class="team-ovr">OVR: 0</span>
              <span class="team-fill">0/11</span>
            </span>
          </div>
        </div>
        <div class="pitch-container">
          <div class="pitch-field"></div>
          <div class="formation-slots"></div>
        </div>
      </div>
      <div class="team-area" data-team="2">
        <div class="team-header">
          <div class="team-emblem"></div>
          <div class="team-info">
            <span class="team-name">Takim 3</span>
            <span class="team-stats">
              <span class="team-ovr">OVR: 0</span>
              <span class="team-fill">0/11</span>
            </span>
          </div>
        </div>
        <div class="pitch-container">
          <div class="pitch-field"></div>
          <div class="formation-slots"></div>
        </div>
      </div>
      <div class="team-area" data-team="3">
        <div class="team-header">
          <div class="team-emblem"></div>
          <div class="team-info">
            <span class="team-name">Takim 4</span>
            <span class="team-stats">
              <span class="team-ovr">OVR: 0</span>
              <span class="team-fill">0/11</span>
            </span>
          </div>
        </div>
        <div class="pitch-container">
          <div class="pitch-field"></div>
          <div class="formation-slots"></div>
        </div>
      </div>
    </main>

    <!-- Notification Area -->
    <div id="notification-area"></div>

    <!-- Card Reveal Overlay -->
    <div id="card-reveal-overlay" class="hidden">
      <div class="reveal-dim"></div>
      <div class="reveal-content">
        <div class="pack-container">
          <div class="pack-front"></div>
          <div class="pack-back">
            <div class="revealed-card"></div>
          </div>
        </div>
      </div>
      <div class="tier-effects"></div>
    </div>

    <!-- Scoreboard Overlay -->
    <div id="scoreboard-overlay" class="hidden">
      <div class="scoreboard-bg"></div>
      <div class="scoreboard-content">
        <h2 class="scoreboard-title">FINAL RESULTS</h2>
        <div class="scoreboard-teams"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="error-screen" class="hidden">
      <div class="error-box">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <p>Session bulunamadi. URL'ye <code>?session=ID</code> ekleyin.</p>
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
